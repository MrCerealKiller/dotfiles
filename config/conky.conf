conky.config = {
	-- General
	background = false,
    use_xft = true,
    update_interval = 1.0,
    cpu_avg_samples = 2,
    net_avg_samples = 2,
	double_buffer = true,
    no_buffers = true,
    text_buffer_size = 2048,
	imlib_cache_size = 0,
    out_to_console = false,
    out_to_stderr = false,
    extra_newline = false,

	-- Window
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
	alignment = 'top_right',
    draw_borders = false,
    stippled_borders = 0,
    draw_outline = false,
    draw_shades = false,
    gap_x = 32,
    gap_y = 32,
    minimum_height = 8,
	minimum_width = 8,
    use_spacer = 'none',

    -- Graphs
    draw_graph_borders = true,
	show_graph_scale = false,
	show_graph_range = false,

    -- Colors
    color1 = 'C8D6E5',	--> neutral
    color2 = '8283BF',	--> title
    color3 = 'FF6B6B',	--> upspeed
    color4 = '1DD1A1',	--> downspeed
	default_color = color1,
    default_outline_color = 'white',
    default_shade_color = 'white',

    -- Text and Font
    font = 'DejaVu Sans Mono:size=10',
    font1 = 'Laksaman:bold:size=12',
    font2 = 'DejaVu Sans Mono:italic:size=8',
    font3 = 'DejaVu Sans Mono:bold:size=8',
    uppercase = false,
    short_units = true,
}

conky.text = [[

## System
${color2}${font1}SYSTEM  ${hr 2}${font}${color1}${voffset 12}
OS:${alignr}${texeci 3600 lsb_release -d | awk '{$1=""; print $0}'}
Config:${alignr}${sysname} ${machine}
Host:${alignr}${exec hostname}
##Users:${alignr}${user_names}
Uptime:${alignr}${uptime_short}

## Processor
${color2}${font1}PROCESSOR  ${hr 2}${font}${color1}${voffset 12}
Total Usage: ${alignr}${cpu cpu0}%
Temperature: ${alignr}${execi 30 sensors|grep 'Package id 0'|awk '{print $4}'}
${cpugraph cpu0 32,220 C8D6E5 C8D6E5 -l}
${voffset -8}${font2}${alignr}(All cores average)

## Memory
${color2}${font1}MEMORY  ${hr 2}${font}${color1}${voffset 12}
Usage:${alignr}${mem} / ${memmax}
${voffset 8}${membar 12,175}${alignr}$memperc%

## Disk
${color2}${font1}DISK  ${hr 2}${font}${color1}${voffset 12}
Usage:${alignr}${fs_used /} / ${fs_size /}
${voffset 8}${fs_bar 12,175  /}${alignr}${fs_used_perc}%

## Network
${color2}${font1}NETWORK  ${hr 2}${font}${color1}${voffset 12}
Wifi:${alignr}${wireless_essid wlp0s20f3}
Private IP:${alignr}${addr wlp0s20f3}
Public IP:${alignr}${execi 60 curl ipinfo.io/ip}
Signal Strength:${alignr}${wireless_link_qual_perc wlp0s20f3}
#
${voffset 12}Up${alignr}${upspeed wlp0s20f3}ps
${upspeedgraph wlp0s20f3 25,220 FFFFFF FFFFFF 1 -l}
${voffset 12}Down${alignr}${downspeed wlp0s20f3}ps
${downspeedgraph wlp0s20f3 25,220 FFFFFF FFFFFF 1 -l}
${voffset 12}LAN Status:#
${alignr}${execi 60 nmcli -t -f DEVICE,STATE device status | grep enp8s0 | sed -n 's/^enp8s0://p'}
LAN Connection:${alignr}${addr enp8s0}

## Processes
${color2}${font1}PROCESSES  ${hr 2}${font}${color1}${voffset 10}
Running:${alignr}${running_processes}/
Total:${alignr}${processes}
#
${voffset 12}${font3}#
${top name 1} ${alignr}${top pid 1}${top cpu 1}%${top mem 1}%
${top name 2} ${alignr}${top pid 2}${top cpu 1}%${top mem 2}%
${top name 3} ${alignr}${top pid 3}${top cpu 1}%${top mem 3}%
${top name 4} ${alignr}${top pid 4}${top cpu 1}%${top mem 4}%
${top name 5} ${alignr}${top pid 5}${top cpu 1}%${top mem 5}%
${voffset 6}${font2}${alignr}${offset -36}PID${alignr}${offset -18}CPU${alignr}MEM

## ROS
${color2}${font1}ROS  ${hr 2}${font}${color1}${voffset 10}
Distro:${alignr}${execi 3600 echo ${ROS_DISTRO}}
Nodes:${alignr}${execi 10 ros2 node list -ac} nodes
Topics:${alignr}${execi 10 ros2 topic list -c} topics

]]
